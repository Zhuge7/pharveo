# Vhost nginx — Pharveo site marketing statique
# Domaine : pharveo.xakili.io  (remplacer par le vrai domaine)
# Fichiers servis depuis : /var/www/pharveo/
#
# Installation sur le VPS :
#   sudo cp pharveo.conf /etc/nginx/sites-available/pharveo
#   sudo ln -s /etc/nginx/sites-available/pharveo /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d pharveo.xakili.io

server {
    listen 80;
    server_name pharveo.xakili.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pharveo.xakili.io;

    # Certificat Let's Encrypt (créé par certbot)
    ssl_certificate     /etc/letsencrypt/live/pharveo.xakili.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pharveo.xakili.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Racine des fichiers statiques
    root /var/www/pharveo;
    index index.html;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Next.js static export : trailingSlash true
    # Les URLs arrivent avec /slug/ → cherche /slug/index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Assets _next/ — cache long terme (immutables, hash dans le nom)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Autres assets publics (images, fonts, etc.)
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2|ttf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Page 404 custom (générée par Next.js)
    error_page 404 /404.html;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Logs séparés
    access_log /var/log/nginx/pharveo-access.log;
    error_log  /var/log/nginx/pharveo-error.log warn;
}
